<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDOT Congregational Data Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --navy:#1b2a4a; --navy-2:#24365c; --navy-deep:#13203b;
  --gold:#c9a227; --gold-soft:#e2c662;
  --red:#9e1b32;
  --ink:#1d2433; --muted:#6b7385; --line:#e6e9f0;
  --bg:#f4f6fa; --card:#ffffff; --card-2:#fbfcfe;
  --good:#2e7d5b; --bad:#b23a48;
  --shadow:0 1px 2px rgba(20,33,61,.06),0 4px 16px rgba(20,33,61,.06);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
a{color:#3f7cac;text-decoration:none}
a:hover{text-decoration:underline}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
.hidden{display:none!important}

/* sticky top stack: header + goldbar + filterbar */
.topstack{position:sticky;top:0;z-index:60}
header.top{background:linear-gradient(120deg,var(--navy-deep),var(--navy));color:#fff;
  padding:13px 26px;display:flex;align-items:center;gap:18px;box-shadow:0 2px 12px rgba(0,0,0,.18)}
header.top .logo{height:36px;width:auto;display:block}
header.top .logo-fallback{font-weight:800;font-size:17px;letter-spacing:.02em;color:#fff}
header.top .logo-fallback span{color:var(--gold-soft)}
header.top .titles{display:flex;flex-direction:column;line-height:1.15}
header.top .titles .t1{font-size:15px;font-weight:650}
header.top .titles .t2{font-size:11.5px;color:#aeb9d4;letter-spacing:.04em;text-transform:uppercase}
header.top .spacer{flex:1}
.chjump{position:relative;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.20);border-radius:9px;padding:6px 11px;min-width:240px}
.chjump:focus-within{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4)}
.chjump-ico{color:#c8d2e8;font-size:15px;line-height:1}
.chjump input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:13px;min-width:0}
.chjump input::placeholder{color:#aeb9d4}
.chjump-pop{position:absolute;top:calc(100% + 7px);left:0;right:0;z-index:90;background:#fff;color:var(--ink);
  border:1px solid var(--line);border-radius:11px;box-shadow:0 14px 38px rgba(20,33,61,.28);
  padding:6px;max-height:340px;overflow-y:auto;display:none;min-width:260px}
.chjump-pop.open{display:block}
.chjump-opt{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:13px}
.chjump-opt:hover,.chjump-opt.active{background:var(--card-2)}
.chjump-opt .nm{font-weight:600;color:var(--navy)}
.chjump-opt .meta{margin-left:auto;font-size:11px;color:var(--muted)}
.chjump-empty{padding:10px;color:#9aa3b5;font-size:12.5px}
@media(max-width:760px){.chjump{order:5;min-width:0;width:100%;flex-basis:100%}}
.goldbar{height:3px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold-soft) 50%,var(--red) 100%)}
.crumb{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#c4cde3}
.btn-back{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;
  padding:7px 14px;border-radius:9px;cursor:pointer;font-size:12.5px;font-weight:600;transition:.15s}
.btn-back:hover{background:rgba(255,255,255,.22)}

/* filter bar */
.filterbar{background:var(--card);border-bottom:1px solid var(--line);box-shadow:0 4px 14px rgba(20,33,61,.05);
  padding:11px 26px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
.fctl{display:flex;flex-direction:column;gap:4px}
.fctl>label{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
.yearsel{padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:#fff;min-width:92px;font-weight:600}
.yearsel:focus{outline:none;border-color:#3f7cac}
.selSummary{margin-left:auto;font-size:12px;color:var(--muted);align-self:center;text-align:right;max-width:280px}
.selSummary b{color:var(--navy)}
.btn-reset{align-self:center;background:#fbfcfe;border:1px solid var(--line);color:var(--muted);
  padding:8px 13px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600}
.btn-reset:hover{border-color:#3f7cac;color:#3f7cac}

/* multiselect */
.ms{position:relative}
.ms-btn{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:9px;
  padding:8px 11px;font-size:13px;cursor:pointer;color:var(--ink);min-width:120px;font-weight:500}
.ms-btn:hover{border-color:#3f7cac}
.ms-btn .ms-val{font-weight:650;color:var(--navy)}
.ms-btn .ms-caret{margin-left:auto;color:var(--muted);font-size:10px}
.ms-pop{position:absolute;top:calc(100% + 5px);left:0;z-index:80;background:#fff;border:1px solid var(--line);
  border-radius:11px;box-shadow:0 12px 34px rgba(20,33,61,.18);padding:8px;min-width:230px;display:none}
.ms-pop.open{display:block}
.ms-search{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;margin-bottom:6px}
.ms-search:focus{outline:none;border-color:#3f7cac}
.ms-actions{display:flex;gap:6px;margin-bottom:6px}
.ms-actions button{flex:1;font-size:11.5px;padding:5px;border:1px solid var(--line);background:var(--card-2);
  border-radius:7px;cursor:pointer;color:var(--muted);font-weight:600}
.ms-actions button:hover{border-color:#3f7cac;color:#3f7cac}
.ms-list{max-height:280px;overflow-y:auto}
.ms-item{display:flex;align-items:center;gap:8px;padding:6px 7px;border-radius:7px;cursor:pointer;font-size:13px}
.ms-item:hover{background:var(--card-2)}
.ms-item input{accent-color:var(--navy);width:15px;height:15px;cursor:pointer}
.ms-item .ms-tag{margin-left:auto;font-size:10px;color:#fff;padding:1px 6px;border-radius:10px;font-weight:700}

main{max-width:1680px;margin:0 auto;padding:22px 26px;min-width:0}

.section-title{display:flex;align-items:baseline;gap:10px;margin:4px 0 14px}
.section-title h2{font-size:18px}
.section-title .sub{font-size:12.5px;color:var(--muted)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:13px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
.kpi .label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.kpi .val{font-size:23px;font-weight:700;margin-top:5px;letter-spacing:-.02em}
.kpi .delta{font-size:11.5px;margin-top:3px;font-weight:600;display:flex;align-items:center;gap:4px}
.kpi .delta.up{color:var(--good)}.kpi .delta.down{color:var(--bad)}.kpi .delta.flat{color:var(--muted)}

.grid{display:grid;gap:16px}
.g-2{grid-template-columns:repeat(2,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px;box-shadow:var(--shadow);margin-bottom:16px}
.card .chead{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card .chead h3{font-size:14.5px}
.card .chead .hint{font-size:11.5px;color:var(--muted)}
.card .chead .spacer{flex:1}
.metric-tag{font-size:11.5px;font-weight:700;color:#fff;background:#3f7cac;padding:2px 9px;border-radius:20px}
.chart-wrap{position:relative;width:100%}
.h-tall{height:340px}.h-mid{height:270px}.h-short{height:210px}
select.mini{font-size:12.5px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;color:var(--ink)}
select.mini:focus{outline:none;border-color:#3f7cac}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{border:none;background:#fff;padding:6px 11px;font-size:12px;cursor:pointer;color:var(--muted);font-weight:600}
.seg button.active{background:var(--navy);color:#fff}
.csv-btn{display:inline-flex;align-items:center;gap:6px;background:#fbfcfe;border:1px solid var(--line);color:var(--navy);
  padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.csv-btn:hover{border-color:#3f7cac;color:#3f7cac}
.tbl-search{padding:7px 11px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;background:#fff;min-width:180px;color:var(--ink)}
.tbl-search:focus{outline:none;border-color:#3f7cac}

.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;font-size:13px}
thead th{background:var(--navy);color:#fff;text-align:right;padding:10px 12px;font-weight:600;font-size:12px;
  white-space:nowrap;cursor:pointer;position:sticky;top:0;user-select:none}
thead th:first-child,thead th.l{text-align:left}
thead th:hover{background:var(--navy-2)}
thead th .arr{opacity:.5;font-size:10px}
tbody td{padding:9px 12px;text-align:right;border-top:1px solid var(--line);white-space:nowrap}
tbody td:first-child,tbody td.l{text-align:left}
tbody tr:hover{background:var(--card-2)}
tbody tr.clickable{cursor:pointer}
.tier-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;color:#fff}
.t-Family{background:#5a8f69}.t-Pastoral{background:#3f7cac}.t-Transitional{background:#9b6fb0}
.t-Program{background:#d98c3f}.t-Resource{background:#9e1b32}.t-NA{background:#9aa3b5}
.type-pill{font-size:11px;padding:2px 8px;border-radius:6px;background:#eef1f7;color:var(--navy);font-weight:600}
.namecell{font-weight:600;color:var(--navy)}
.namecell:hover{color:#3f7cac}

.ch-header{background:linear-gradient(120deg,var(--navy-deep),var(--navy-2));color:#fff;border-radius:var(--radius);
  padding:22px 24px;margin-bottom:18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.ch-header::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,162,39,.22),transparent 70%)}
.ch-header h1{font-size:25px;margin-bottom:6px}
.ch-meta{display:flex;flex-wrap:wrap;gap:10px 22px;font-size:13px;color:#c8d2e8;margin-top:10px}
.ch-meta b{color:#fff;font-weight:600}
.ch-meta .badge{background:rgba(255,255,255,.14);padding:3px 11px;border-radius:20px;font-weight:600;color:#fff}
.ch-meta a{color:var(--gold-soft)}
.ch-tier{position:absolute;right:24px;top:22px;text-align:right;z-index:2}
.ch-tier .lab{font-size:11px;color:#aeb9d4;text-transform:uppercase;letter-spacing:.05em}

.empty{padding:40px;text-align:center;color:var(--muted);font-size:14px}
.footer{max-width:1680px;margin:8px auto 30px;padding:14px 26px;color:var(--muted);font-size:11.5px;border-top:1px solid var(--line)}
.legend-inline{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:8px}
.legend-inline span{display:inline-flex;align-items:center;gap:5px}
.legend-inline i{width:11px;height:11px;border-radius:3px;display:inline-block}

/* map */
.map-wrap{position:relative;width:100%;height:300px;display:flex;align-items:center;justify-content:center}
#txmap{height:100%;width:auto;max-width:100%;display:block;overflow:hidden}
#txmap path{stroke:#fff;stroke-width:.5;cursor:default;transition:opacity .12s}
#txmap path.has:hover{stroke:#13203b;stroke-width:1.4}
.map-tip{position:fixed;pointer-events:none;background:#13203b;color:#fff;padding:8px 11px;border-radius:8px;
  font-size:12px;line-height:1.4;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:200;display:none;max-width:220px}
.map-tip b{color:var(--gold-soft)}
.map-legend{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
.map-legend .bar{height:11px;width:160px;border-radius:3px;background:linear-gradient(90deg,#e7edf6,#1b2a4a)}
.map-legend .nochurch{display:inline-flex;align-items:center;gap:5px}
.map-legend .nochurch i{width:11px;height:11px;border-radius:3px;background:#f0f2f6;border:1px solid #e0e4ec;display:inline-block}
@media(max-width:1100px){.g-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:880px){.g-2,.g-3{grid-template-columns:1fr}.selSummary{display:none}}

/* ===== Mobile optimization ===== */
@media(max-width:760px){
  header.top{padding:10px 14px;gap:10px;flex-wrap:wrap}
  header.top .logo{height:30px}
  header.top .titles .t1{font-size:13.5px}
  header.top .titles .t2{font-size:10px}
  .crumb{font-size:11.5px;gap:6px}
  .btn-back{padding:6px 11px;font-size:12px}
  .filterbar{padding:9px 14px;gap:9px}
  .fctl{flex:1 1 132px}
  .yearsel,.ms-btn{min-width:0;width:100%}
  .ms-pop{min-width:200px}
  main{padding:16px 14px}
  .section-title h2{font-size:16px}
  .section-title .sub{font-size:11.5px}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
  .kpi{padding:11px 12px}
  .kpi .val{font-size:19px}
  .kpi .label{font-size:10.5px}
  .card{padding:13px 13px;margin-bottom:13px}
  .card .chead h3{font-size:13.5px}
  .grid{gap:12px}
  .h-tall{height:280px}.h-mid{height:230px}.h-short{height:190px}
  .ch-header{padding:18px 16px;margin-bottom:14px}
  .ch-header h1{font-size:20px}
  .ch-meta{gap:7px 16px;font-size:12px}
  .ch-tier{position:static;text-align:left;margin-bottom:10px}
  .ch-header::after{display:none}
  .map-wrap{height:240px}
  table{font-size:12px}
  thead th,tbody td{padding:8px 9px}
  .tbl-search{min-width:0;width:100%}
  .footer{padding:12px 14px}
}
@media(max-width:430px){
  .kpi-grid{grid-template-columns:1fr 1fr;gap:8px}
  .kpi .val{font-size:18px}
  .h-tall{height:250px}.h-mid{height:210px}.h-short{height:175px}
  .ch-header h1{font-size:18px}
  .section-title{flex-wrap:wrap;gap:4px}
}

@media print {
  .topstack, .goldbar, .filterbar, #backBtn, .btn-back, .chjump, #crumb, .csv-btn, .print-btn { display:none !important; }
  #view-dashboard { display:none !important; }
  html, body { background:#fff !important; }
  main { padding:0 !important; margin:0 !important; }
  .ch-header { margin-top:0 !important; }
  .card, .kpi, .grid { break-inside: avoid; page-break-inside: avoid; }
  .card { box-shadow:none !important; border:1px solid #d7dce5 !important; }
  .chart-wrap { page-break-inside: avoid; }
  a[href]:after { content:""; }
  @page { margin: 12mm; size: portrait; }
}
</style>
</head>
<body>
<div class="topstack">
  <header class="top">
    <img class="logo" src="https://www.epicenter.org/wp-content/uploads/2021/08/EDOT-logo-white-transparent.png"
         alt="Episcopal Diocese of Texas" onerror="this.style.display='none';document.getElementById('lfb').style.display='block'">
    <div id="lfb" class="logo-fallback" style="display:none">E<span>D</span>OT</div>
    <div class="titles">
      <div class="t1">Congregational Data Dashboard</div>
      <div class="t2">Episcopal Diocese of Texas</div>
    </div>
    <div class="chjump" id="chJump">
      <span class="chjump-ico">⌕</span>
      <input id="chJumpInput" type="search" autocomplete="off" placeholder="Jump to a church…">
      <div class="chjump-pop" id="chJumpPop"></div>
    </div>
    <div class="spacer"></div>
    <div id="crumb" class="crumb"></div>
    <button id="backBtn" class="btn-back hidden">&larr; Back to dashboard</button>
  </header>
  <div class="goldbar"></div>
  <div class="filterbar" id="filterbar">
    <div class="fctl"><label>Reporting Year</label><select id="yearSel" class="yearsel"></select></div>
    <div class="fctl"><label>Church Type</label><div id="ms-type"></div></div>
    <div class="fctl"><label>Region</label><div id="ms-region"></div></div>
    <div class="fctl"><label>Convocation</label><div id="ms-conv"></div></div>
    <div class="fctl"><label>Size Tier (ASA)</label><div id="ms-size"></div></div>
    <div class="fctl"><label>Churches (compare)</label><div id="ms-church"></div></div>
    <button id="resetBtn" class="btn-reset">Reset</button>
    <div class="selSummary" id="selSummary"></div>
  </div>
</div>

<main>
  <div id="view-dashboard"></div>
  <div id="view-church" class="hidden"></div>
</main>
<div class="map-tip" id="mapTip"></div>

<script>
/* ============ EDOT Congregational Dashboard ============ */
const KI = {}; DATA.keys.forEach((k,i)=>KI[k]=i+1);   // row = [year, ...values]
const YEARS = DATA.years;
const LATEST = YEARS[YEARS.length-1];

/* metric metadata */
const M = {
  memYE:{label:'Membership (Year End)',fmt:'int',agg:'sum'},
  comm:{label:'Communicants in Good Standing',fmt:'int',agg:'sum'},
  asa:{label:'Avg Sunday Attendance (ASA)',fmt:'int',agg:'sum'},
  easter:{label:'Easter Attendance',fmt:'int',agg:'sum'},
  xmas:{label:'Christmas Attendance',fmt:'int',agg:'sum'},
  marr:{label:'Marriages',fmt:'int',agg:'sum'},
  bur:{label:'Burials',fmt:'int',agg:'sum'},
  bap:{label:'Baptisms',fmt:'int',agg:'sum'},
  conf:{label:'Confirmations',fmt:'int',agg:'sum'},
  recep:{label:'Receptions',fmt:'int',agg:'sum'},
  pledgeAmt:{label:'Total Pledged Amount',fmt:'money',agg:'sum'},
  pledgeUnits:{label:'Pledge Units',fmt:'int',agg:'sum'},
  avgPledge:{label:'Average Pledge Amount',fmt:'money',agg:'wavg'},
  plate:{label:'Plate & Pledge',fmt:'money',agg:'sum'},
  opRev:{label:'Total Operating Revenue',fmt:'money',agg:'sum'},
  nonOpRev:{label:'Non-Operating Revenue',fmt:'money',agg:'sum'},
  totRev:{label:'Total Revenues',fmt:'money',agg:'sum'},
  exp:{label:'Expenses',fmt:'money',agg:'sum'},
  outreach:{label:'Outreach from Operating Revenue',fmt:'money',agg:'sum'},
  assess:{label:'Diocesan Assessment',fmt:'money',agg:'sum'},
  capital:{label:'Capital Funds',fmt:'money',agg:'sum'},
  saturation:{label:'Market Saturation % (Membership ÷ 10-mi pop)',fmt:'pct3',agg:'sat'},
};
const KEY_METRICS = ['memYE','asa','pledgeUnits','avgPledge','opRev','exp','outreach'];
const MAIN_KPIS = [...KEY_METRICS,'saturation'];
const PALETTE = ['#1b2a4a','#c9a227','#9e1b32','#3f7cac','#5a8f69','#9b6fb0','#d98c3f','#4aa3a3','#8a99b5','#b8556a','#6d8b3a','#c77d9c'];
const TIERS = ['Family','Pastoral','Transitional','Program','Resource'];
const TIER_COLORS = {Family:'#5a8f69',Pastoral:'#3f7cac',Transitional:'#9b6fb0',Program:'#d98c3f',Resource:'#9e1b32','N/A':'#9aa3b5'};

/* index churches by year */
DATA.churches.forEach(c=>{
  c._y={}; c._years=[];
  c.rows.forEach(r=>{ c._y[r[0]]=r; c._years.push(r[0]); });
});
const CH_BY_ID = {}; DATA.churches.forEach(c=>CH_BY_ID[c.id]=c);

/* diocesan weighted-average pledge per year = sum(pledgeAmt)/sum(pledgeUnits) */
const DIOCESE_AVG_PLEDGE = {};
YEARS.forEach(y=>{
  let amt=0,units=0;
  DATA.churches.forEach(c=>{ const a=val(c,y,'pledgeAmt'),u=val(c,y,'pledgeUnits');
    if(a!=null&&u!=null&&u>0){ amt+=a; units+=u; } });
  DIOCESE_AVG_PLEDGE[y]= units>0 ? amt/units : null;
});

/* helpers */
function val(c,year,key){ if(key==='saturation'){ const r=c._y[year]; const a=r?r[KI['memYE']]:null; const p=popYear(c,year); return (a!=null&&p>0)? a/p*100 : null; } const r=c._y[year]; return r? r[KI[key]] : null; }
function popYear(c,year){ if(c.pop10y){ const i=YEARS.indexOf(year); if(i>=0&&c.pop10y[i]!=null) return c.pop10y[i]; } return c.pop10||null; }
function tierFromASA(a){ if(a==null) return 'N/A'; if(a<=0) return 'N/A'; if(a<=75)return'Family'; if(a<=150)return'Pastoral'; if(a<=225)return'Transitional'; if(a<=450)return'Program'; return 'Resource'; }
function tierForChurch(c,year){
  let a=val(c,year,'asa');
  if(a==null||a<=0){ // fall back to latest available year with ASA
    for(let i=c._years.length-1;i>=0;i--){ const yy=c._years[i]; if(yy<=year){ const v=val(c,yy,'asa'); if(v>0){a=v;break;} } }
  }
  return tierFromASA(a);
}
function fmt(v,type){
  if(v==null||isNaN(v)) return '—';
  if(type==='money') return '$'+Math.round(v).toLocaleString();
  if(type==='money0') return '$'+Math.round(v).toLocaleString();
  if(type==='pct') return v.toFixed(1)+'%';
  if(type==='pct3') return v.toFixed(3)+'%';
  return Math.round(v).toLocaleString();
}
function fmtShort(v){
  if(v==null) return '—';
  const a=Math.abs(v);
  if(a>=1e6) return (v/1e6).toFixed(1)+'M';
  if(a>=1e3) return (v/1e3).toFixed(0)+'k';
  return Math.round(v).toString();
}

/* ============ STATE ============ */
const state = {
  year: LATEST,
  type: new Set(), region:new Set(), conv:new Set(), size:new Set(TIERS),
  selected: new Set(),
  trendMetric:'asa',
  trendMode:'auto',
  sortKey:'memYE', sortDir:-1,
  search:'',
  mapMetric:'count'
};

/* facet value lists */
const TYPES=[...new Set(DATA.churches.map(c=>c.type))].sort();
const REGIONS=[...new Set(DATA.churches.map(c=>c.region))].sort();
const CONVS=[...new Set(DATA.churches.map(c=>c.conv))].sort();
TYPES.forEach(t=>state.type.add(t));
REGIONS.forEach(t=>state.region.add(t));
CONVS.forEach(t=>state.conv.add(t));

/* churches passing facet filters (type/region/conv/size) at current year */
function facetChurches(){
  return DATA.churches.filter(c=>
    state.type.has(c.type) && state.region.has(c.region) && state.conv.has(c.conv)
    && state.size.has(tierForChurch(c,state.year))
  );
}
/* true when any facet filter is narrowed from "all" or any church is selected */
function anyFilterActive(){
  return state.selected.size>0
    || state.type.size < TYPES.length
    || state.region.size < REGIONS.length
    || state.conv.size < CONVS.length
    || state.size.size < TIERS.length;
}
/* active set used for KPIs & charts */
function activeChurches(){
  const fc=facetChurches();
  if(state.selected.size>0) return fc.filter(c=>state.selected.has(c.id));
  return fc;
}

/* aggregate a metric over a set of churches for a given year */
function aggregate(churches,key,year){
  const meta=M[key];
  if(meta.agg==='sat'){ let a=0,p=0; churches.forEach(c=>{ const aa=val(c,year,'memYE'),pp=popYear(c,year); if(aa!=null&&pp>0){a+=aa;p+=pp;} }); return p>0? a/p*100 : null; }
  if(meta.agg==='wavg'){ // avg pledge = total pledged / total units
    let amt=0,units=0;
    churches.forEach(c=>{ const a=val(c,year,'pledgeAmt'),u=val(c,year,'pledgeUnits'); if(a)amt+=a; if(u)units+=u; });
    return units>0? amt/units : null;
  }
  let s=0,n=0;
  churches.forEach(c=>{ const v=val(c,year,key); if(v!=null){s+=v;n++;} });
  return n>0? s : null;
}

/* ============ MULTISELECT COMPONENT ============ */
const MS_REFS={};
function multiselect(mountId,labelText,o){
  o=o||{};
  const wrap=document.getElementById(mountId); wrap.className='ms';
  wrap.innerHTML=`<button class="ms-btn" type="button"><span class="ms-val"></span><span class="ms-caret">▾</span></button>
    <div class="ms-pop">${o.search?'<input class="ms-search" placeholder="Search…">':''}
      <div class="ms-actions"><button data-a="all">All</button><button data-a="none">${o.noneLabel||'Clear'}</button></div>
      <div class="ms-list"></div></div>`;
  const btn=wrap.querySelector('.ms-btn'), pop=wrap.querySelector('.ms-pop'),
        list=wrap.querySelector('.ms-list'), valEl=wrap.querySelector('.ms-val'),
        search=wrap.querySelector('.ms-search');
  const stateSet=o.set;
  function curVals(){ return o.dynamic? o.dynamic() : o.values; }
  function id(v){ return o.itemId? o.itemId(v):v; }
  function lbl(v){ return o.itemLabel? o.itemLabel(v):v; }
  function renderList(){
    const q=search? search.value.toLowerCase():'';
    const vals=curVals().filter(v=>String(lbl(v)).toLowerCase().includes(q));
    list.innerHTML='';
    vals.forEach(v=>{
      const item=document.createElement('label'); item.className='ms-item';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=stateSet.has(id(v));
      cb.addEventListener('change',()=>{ cb.checked?stateSet.add(id(v)):stateSet.delete(id(v)); updateVal(); o.onchange&&o.onchange(); });
      const sp=document.createElement('span'); sp.textContent=lbl(v);
      item.appendChild(cb); item.appendChild(sp);
      if(o.itemTag){ const t=o.itemTag(v); if(t){const tg=document.createElement('span'); tg.className='ms-tag'; tg.textContent=t.text; tg.style.background=t.color; item.appendChild(tg);} }
      list.appendChild(item);
    });
    if(!vals.length) list.innerHTML='<div style="padding:10px;color:#9aa3b5;font-size:12px">No matches</div>';
  }
  function updateVal(){
    const total=curVals().length, n=stateSet.size;
    if(n===0) valEl.textContent=o.zeroLabel||'None';
    else if(o.allLabel && n>=total && total>0) valEl.textContent='All';
    else if(n===1) valEl.textContent=o.idLabel? o.idLabel([...stateSet][0]) : [...stateSet][0];
    else valEl.textContent=n+' selected';
  }
  btn.addEventListener('click',e=>{ e.stopPropagation();
    const open=pop.classList.contains('open');
    document.querySelectorAll('.ms-pop.open').forEach(p=>p.classList.remove('open'));
    if(!open){ pop.classList.add('open'); renderList(); search&&search.focus(); } });
  pop.addEventListener('click',e=>e.stopPropagation());
  if(search) search.addEventListener('input',renderList);
  wrap.querySelectorAll('.ms-actions button').forEach(b=>b.addEventListener('click',()=>{
    const vals=curVals();
    if(b.dataset.a==='all') vals.forEach(v=>stateSet.add(id(v)));
    else { if(o.dynamic) vals.forEach(v=>stateSet.delete(id(v))); else stateSet.clear(); }
    renderList(); updateVal(); o.onchange&&o.onchange();
  }));
  updateVal();
  MS_REFS[mountId]={refresh:()=>{updateVal(); if(pop.classList.contains('open'))renderList();}};
}

function downloadCSV(name,rows){
  const csv=rows.map(r=>r.map(c=>{ c=(c==null)?'':String(c); return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c; }).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function exportMainTable(){
  const set=sortedActive();
  const header=['Church','Type','Convocation','Region','County','Size Tier','Year',...TABLE_COLS.filter(c=>!['name','type','conv','tier'].includes(c.k)).map(c=>M[c.k].label)];
  const valKeys=TABLE_COLS.filter(c=>!['name','type','conv','tier'].includes(c.k)).map(c=>c.k);

  set.forEach(c=>{ rows.push([c.name,c.type,c.conv,c.region,c.county,tierForChurch(c,state.year),state.year,

}

/* ============ KPIs ============ */
function renderKPIs(){
  const set=activeChurches();
  const grid=document.getElementById('kpiGrid'); grid.innerHTML='';
  const priorYears=[state.year-1,state.year-2,state.year-3].filter(y=>YEARS.includes(y));
  MAIN_KPIS.forEach(k=>{
    const cur=aggregate(set,k,state.year);
    // baseline = average of the metric over the trailing 3 reported years
    let prev=null;
    if(priorYears.length){
      const vals=priorYears.map(y=>aggregate(set,k,y)).filter(v=>v!=null);
      if(vals.length) prev=vals.reduce((a,b)=>a+b,0)/vals.length;
    }
    let deltaHtml='<div class="delta flat">—</div>';
    if(cur!=null&&prev!=null&&prev!==0){
      const d=(cur-prev)/Math.abs(prev)*100;
      const cls=d>0.05?'up':(d<-0.05?'down':'flat');
      const arr=d>0.05?'▲':(d<-0.05?'▼':'■');
      deltaHtml=`<div class="delta ${cls}">${arr} ${Math.abs(d).toFixed(1)}% vs 3-yr avg</div>`;
    }
    const div=document.createElement('div'); div.className='kpi';
    div.innerHTML=`<div class="label">${M[k].label}</div>
      <div class="val">${fmt(cur,M[k].fmt)}</div>${deltaHtml}`;
    grid.appendChild(div);
  });
  const set2=activeChurches();
  const titleEl=document.getElementById('dashTitle'), subEl=document.getElementById('dashSub');
  if(state.selected.size>0){
    if(state.selected.size===1){ const only=CH_BY_ID[[...state.selected][0]]; titleEl.textContent=only?only.name:'Selection'; }
    else titleEl.textContent=`${state.selected.size} churches compared`;
    subEl.textContent=`Snapshot ${state.year} · totals across selection`;
  }else{
    titleEl.textContent='Diocesan overview';
    subEl.textContent=`Snapshot ${state.year} · ${set2.length} churches · totals across all filtered congregations`;
  }
}

function chartBase(){return{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
  plugins:{legend:{labels:{boxWidth:12,font:{size:11},usePointStyle:true}}}}}
function yFmtCallback(key){ const meta=M[key]; return v=> meta.fmt==='money'? '$'+fmtShort(v): ((meta.fmt==='pct3'||meta.fmt==='pct')? (+v).toFixed(meta.fmt==='pct3'?2:1)+'%' : fmtShort(v)); }

function updateTrend(){
  const ctx=document.getElementById('trendChart'); if(!ctx)return;
  const meta=M[state.trendMetric], key=state.trendMetric;
  const selObjs = facetChurches().filter(c=>state.selected.has(c.id));
  let mode=state.trendMode;
  if(mode==='auto') mode = anyFilterActive()? 'church':'aggregate';
  let datasets=[], hint='';
  if(mode==='church'){
    let plot=selObjs.slice();
    let topNote='';
    if(plot.length===0){ // no explicit selection: plot top churches by this metric so the view is never blank
      plot=activeChurches().slice().sort((a,b)=>(val(b,state.year,key)??-1)-(val(a,state.year,key)??-1)).slice(0,12);
      topNote=`top ${plot.length} by ${meta.label.toLowerCase()} (${state.year}) — select churches to compare specific ones`;
    } else if(plot.length>15){
      plot=plot.slice(0,15); topNote='showing first 15 selected';

    plot.forEach((c,i)=>{
      const col=PALETTE[i%PALETTE.length];
      datasets.push({label:c.name,data:YEARS.map(y=>val(c,y,key)),
        borderColor:col,backgroundColor:col,tension:.3,spanGaps:true,pointRadius:2,borderWidth:2});
    });
    hint = topNote || `${plot.length} church${plot.length>1?'es':''}`;
    document.getElementById('trendHint').textContent=hint;
  } else {
    const set=activeChurches();
    datasets.push({label:meta.agg==='wavg'?'Weighted average':(meta.agg==='sat'?'Combined saturation (all filtered)':'Total (all filtered)'),// sat = combined membership ÷ combined population
      data:YEARS.map(y=>aggregate(set,key,y)),
      borderColor:'#1b2a4a',backgroundColor:'rgba(27,42,74,.08)',fill:true,tension:.3,spanGaps:true,pointRadius:2,borderWidth:2.5});
    document.getElementById('trendHint').textContent=`${set.length} churches · ${meta.agg==='wavg'?'weighted avg':(meta.agg==='sat'?'combined membership ÷ combined population':'total')}`;
  }
  const cfg={type:'line',data:{labels:YEARS,datasets},options:{...chartBase(),
    scales:{y:{ticks:{callback:yFmtCallback(state.trendMetric)},grid:{color:'#eef0f5'}},x:{grid:{display:false}}},
    plugins:{...chartBase().plugins,legend:{display:datasets.length<=15,position:'bottom',labels:{boxWidth:12,font:{size:11},usePointStyle:true}},
      tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.parsed.y,meta.fmt)}`}}}}};
  if(charts.trend)charts.trend.destroy();
  charts.trend=new Chart(ctx,cfg);

function sortedActive(){
  let set=activeChurches().slice();
  const q=(state.search||'').trim().toLowerCase();
  if(q) set=set.filter(c=>c.name.toLowerCase().includes(q)
    || (c.county&&c.county.toLowerCase().includes(q))
    || (c.conv&&c.conv.toLowerCase().includes(q)));
  const sk=state.sortKey;
  set.sort((a,b)=>{
    let va,vb;
    if(sk==='name'||sk==='type'||sk==='conv'){va=a[sk];vb=b[sk];return state.sortDir*va.localeCompare(vb);}
    if(sk==='tier'){va=TIERS.indexOf(tierForChurch(a,state.year));vb=TIERS.indexOf(tierForChurch(b,state.year));}
    else{va=val(a,state.year,sk);vb=val(b,state.year,sk);}
    va=va==null?-Infinity:va; vb=vb==null?-Infinity:vb;
    return state.sortDir*(va-vb);
  });
  return set;
}

/* ============ COUNTY CHOROPLETH MAP ============ */
const MAP = { built:false, paths:{}, W:760, H:620 };
function _norm(s){ return String(s||'').toLowerCase().replace(/\s+county$/,'').replace(/[^a-z]/g,''); }
function buildMap(){
  const svg=document.getElementById('txmap'); if(!svg||typeof GEO==='undefined'||!GEO) return;
  const feats=GEO.features;
  // bounds across only counties that actually have churches, so the map zooms
  // into the diocesan footprint instead of showing the whole state
  const churchCounties=new Set(DATA.churches.map(c=>_norm(c.county)).filter(Boolean));
  let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9, hit=false;
  feats.forEach(f=>{ if(!churchCounties.has(_norm(f.properties.name))) return;
    eachRing(f,ring=>ring.forEach(p=>{ hit=true; if(p[0]<minX)minX=p[0]; if(p[0]>maxX)maxX=p[0]; if(p[1]<minY)minY=p[1]; if(p[1]>maxY)maxY=p[1]; })); });
  if(!hit){ // fallback to full extent if no county match
    feats.forEach(f=>eachRing(f,ring=>ring.forEach(p=>{ if(p[0]<minX)minX=p[0]; if(p[0]>maxX)maxX=p[0]; if(p[1]<minY)minY=p[1]; if(p[1]>maxY)maxY=p[1]; })));
  }
  // pad the bounding box a little so edge counties aren't flush against the frame
  const padX=(maxX-minX)*0.06, padY=(maxY-minY)*0.06;
  minX-=padX; maxX+=padX; minY-=padY; maxY+=padY;
  const midLat=(minY+maxY)/2*Math.PI/180, kx=Math.cos(midLat);
  const spanX=(maxX-minX)*kx, spanY=(maxY-minY);
  // make the canvas match the zoomed region's aspect ratio to minimise empty margins
  const pad=8, W=MAP.W, H=Math.round(W*(spanY/spanX));
  const scale=Math.min((W-2*pad)/spanX,(H-2*pad)/spanY);
  const offX=(W-spanX*scale)/2, offY=(H-spanY*scale)/2;
  const px=lon=>offX+(lon-minX)*kx*scale;
  const py=lat=>offY+(maxY-lat)*scale;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  let html='';
  MAP.paths={};
  feats.forEach((f,i)=>{
    let d='';
    eachRing(f,ring=>{ d+='M'+ring.map(p=>px(p[0]).toFixed(1)+','+py(p[1]).toFixed(1)).join('L')+'Z'; });
    const nm=f.properties.name;
    html+=`<path data-c="${_norm(nm)}" data-name="${nm.replace(/"/g,'')}" d="${d}"></path>`;
  });
  svg.innerHTML=html;
  svg.querySelectorAll('path').forEach(p=>{
    MAP.paths[p.dataset.c]=p;
    p.addEventListener('mousemove',mapHover); p.addEventListener('mouseleave',mapOut);
  });
  MAP.built=true;
}
function eachRing(f,cb){
  const g=f.geometry; if(!g) return;
  if(g.type==='Polygon') g.coordinates.forEach(cb);
  else if(g.type==='MultiPolygon') g.coordinates.forEach(poly=>poly.forEach(cb));
}
function lerpColor(a,b,t){
  const ah=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
  const bh=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
  const r=Math.round(ah[0]+(bh[0]-ah[0])*t),g=Math.round(ah[1]+(bh[1]-ah[1])*t),bl=Math.round(ah[2]+(bh[2]-ah[2])*t);
  return `rgb(${r},${g},${bl})`;
}
const MAP_LO='#e7edf6', MAP_HI='#1b2a4a', MAP_NODATA='#f0f2f6';
function updateMap(){
  if(!MAP.built) buildMap();
  if(!MAP.built) return;
  const key=state.mapMetric, set=activeChurches(), yr=state.year;
  // aggregate by county
  const byCounty={};
  set.forEach(c=>{
    const cn=_norm(c.county); if(!cn) return;
    if(!byCounty[cn]) byCounty[cn]={count:0,amt:0,units:0,sum:0};
    const b=byCounty[cn]; b.count++;
    if(key==='avgPledge'){ const a=val(c,yr,'pledgeAmt'),u=val(c,yr,'pledgeUnits'); if(a)b.amt+=a; if(u)b.units+=u; }
    else if(key!=='count'){ const v=val(c,yr,key); if(v!=null)b.sum+=v; }
  });
  const valueOf=b=> key==='count'? b.count : (key==='avgPledge'? (b.units>0?b.amt/b.units:null) : b.sum);
  let max=0;
  Object.values(byCounty).forEach(b=>{ const v=valueOf(b); if(v!=null&&v>max)max=v; });
  MAP._byCounty=byCounty; MAP._valueOf=valueOf; MAP._max=max;
  Object.entries(MAP.paths).forEach(([cn,p])=>{
    const b=byCounty[cn]; const v=b?valueOf(b):null;
    if(v==null||(key==='count'&&v===0)){ p.setAttribute('fill',MAP_NODATA); p.classList.remove('has'); }
    else { const t=max>0? Math.sqrt(v/max):0; p.setAttribute('fill',lerpColor(MAP_LO,MAP_HI,t)); p.classList.add('has'); }
  });
  // legend + hint
  const label=key==='count'?'Number of churches':M[key].label;
  document.getElementById('mapHint').textContent=`${label} · year ${yr}`;
  const fmtType=key==='count'?'int':M[key].fmt;
  const leg=document.getElementById('mapLegend');
  leg.innerHTML=`<span class="leg-lab">0</span><span class="bar"></span><span class="leg-lab">${fmt(max,fmtType)}</span>`+
    `<span class="nochurch"><i></i> no churches in filter</span>`;
}
function mapHover(e){
  const p=e.currentTarget, tip=document.getElementById('mapTip');
  const cn=p.dataset.c, b=MAP._byCounty&&MAP._byCounty[cn];
  const key=state.mapMetric, label=key==='count'?'Churches':M[key].label;
  let line;
  if(!b){ line='No churches in current filter'; }
  else { const v=MAP._valueOf(b); const ft=key==='count'?'int':M[key].fmt;
    line=`${b.count} church${b.count!==1?'es':''}`+(key!=='count'?` · ${label}: ${fmt(v,ft)}`:''); }
  tip.innerHTML=`<b>${p.dataset.name} County</b><br>${line}`;
  tip.style.display='block';
  tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px';
}
function mapOut(){ const tip=document.getElementById('mapTip'); if(tip)tip.style.display='none'; }

function renderChurchKpis(c){
  const grid=document.getElementById('chKpis'); grid.innerHTML='';
  // baseline = average of the metric over the 3 reported years prior to the latest year (matches main dashboard)
  function avg3(key,ly){
    const vals=[ly-1,ly-2,ly-3].map(y=>val(c,y,key)).filter(v=>v!=null);
    return vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  }
  KEY_METRICS.forEach(k=>{
    const ly=lastYearWith(c,k); const cur=val(c,ly,k);
    const prev=avg3(k,ly);
    let deltaHtml='<div class="delta flat">—</div>';
    if(cur!=null&&prev!=null&&prev!==0){
      const d=(cur-prev)/Math.abs(prev)*100; const cls=d>0.05?'up':(d<-0.05?'down':'flat');
      const arr=d>0.05?'▲':(d<-0.05?'▼':'■');
      deltaHtml=`<div class="delta ${cls}">${arr} ${Math.abs(d).toFixed(1)}% vs 3-yr avg</div>`;
    }
    const div=document.createElement('div'); div.className='kpi';
    div.innerHTML=`<div class="label">${M[k].label}</div><div class="val">${fmt(cur,M[k].fmt)}</div>${deltaHtml}
      <div style="font-size:10.5px;color:#9aa3b5;margin-top:2px">as of ${ly}</div>`;
    grid.appendChild(div);
  });
  if(c.pop10){
    const ly=lastYearWith(c,'memYE'); const mem=val(c,ly,'memYE'); const popLy=popYear(c,ly);
    const sat=(mem!=null&&popLy>0)?mem/popLy*100:null;
    // 3-yr avg baseline for saturation
    const satVals=[ly-1,ly-2,ly-3].map(y=>{const m=val(c,y,'memYE');const p=popYear(c,y);return (m!=null&&p>0)?m/p*100:null;}).filter(v=>v!=null);
    const prevSat=satVals.length? satVals.reduce((a,b)=>a+b,0)/satVals.length : null;
    let dh='<div class="delta flat">—</div>';
    if(sat!=null&&prevSat!=null&&prevSat!==0){
      const d=(sat-prevSat)/prevSat*100;
      const cls=d>0.05?'up':(d<-0.05?'down':'flat'); const arr=d>0.05?'▲':(d<-0.05?'▼':'■');
      dh=`<div class="delta ${cls}">${arr} ${Math.abs(d).toFixed(1)}% vs 3-yr avg</div>`;
    }
    const div=document.createElement('div'); div.className='kpi';
    div.innerHTML=`<div class="label">Market Saturation</div><div class="val">${sat!=null?sat.toFixed(3)+'%':'—'}</div>${dh}
      <div style="font-size:10.5px;color:#9aa3b5;margin-top:2px">Membership ÷ ${fmt(popLy,'int')} within 10 mi (${ly})</div>`;
    grid.appendChild(div);
  }
}

/* ============ HEADER CHURCH JUMP ============ */
function buildChurchJump(){
  const input=document.getElementById('chJumpInput'), pop=document.getElementById('chJumpPop');
  if(!input||!pop) return;
  const all=DATA.churches.slice().sort((a,b)=>a.name.localeCompare(b.name));
  let matches=[], active=-1;
  function render(){
    const q=input.value.trim().toLowerCase();
    matches=(q? all.filter(c=>c.name.toLowerCase().includes(q)||(c.conv&&c.conv.toLowerCase().includes(q))) : all).slice(0,40);
    active=-1;
    pop.innerHTML = matches.length
      ? matches.map((c,i)=>`<div class="chjump-opt" data-id="${c.id}" data-i="${i}"><span class="nm">${c.name}</span><span class="meta">${c.conv||''}</span></div>`).join('')
      : '<div class="chjump-empty">No churches match.</div>';
  }
  function open(){ render(); pop.classList.add('open'); }
  function close(){ pop.classList.remove('open'); }
  function choose(c){ if(!c)return; close(); input.value=''; input.blur(); openChurch(c.id); }
  function highlight(){ pop.querySelectorAll('.chjump-opt').forEach(o=>o.classList.toggle('active',+o.dataset.i===active)); }
  input.addEventListener('focus',open);
  input.addEventListener('input',()=>{ if(!pop.classList.contains('open'))pop.classList.add('open'); render(); });
  input.addEventListener('keydown',e=>{
    if(!pop.classList.contains('open')&&(e.key==='ArrowDown'||e.key==='ArrowUp')) open();
    if(e.key==='ArrowDown'){ e.preventDefault(); active=Math.min(active+1,matches.length-1); highlight(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); active=Math.max(active-1,0); highlight(); }
    else if(e.key==='Enter'){ e.preventDefault(); choose(matches[active>=0?active:0]); }
    else if(e.key==='Escape'){ close(); input.blur(); }
  });
  pop.addEventListener('mousedown',e=>{ const opt=e.target.closest('.chjump-opt'); if(opt) choose(CH_BY_ID[+opt.dataset.id]); });
  document.getElementById('chJump').addEventListener('click',e=>e.stopPropagation());
  document.addEventListener('click',close);
}

    dynamic:()=>facetChurches(), itemId:c=>c.id, itemLabel:c=>c.name,
    idLabel:id=>{const c=CH_BY_ID[id];return c?c.name:id;},
    itemTag:c=>{const t=tierForChurch(c,state.year);return t==='N/A'?null:{text:t[0],color:TIER_COLORS[t]};},
    onchange:reAll});
  document.getElementById('resetBtn').addEventListener('click',()=>{
    TYPES.forEach(t=>state.type.add(t)); REGIONS.forEach(t=>state.region.add(t));
    CONVS.forEach(t=>state.conv.add(t)); TIERS.forEach(t=>state.size.add(t));
    state.selected.clear();
    Object.values(MS_REFS).forEach(r=>r.refresh()); refreshAll();
  });
  document.getElementById('backBtn').addEventListener('click',backToDash);
  // ensure Chart.js canvases re-layout to the print page width so they don't blank out
  window.addEventListener('beforeprint',()=>{ Object.values(charts).forEach(ch=>{ try{ch.resize();}catch(e){} }); });
  window.addEventListener('afterprint',()=>{ Object.values(charts).forEach(ch=>{ try{ch.resize();}catch(e){} }); });
  dashSkeleton();
  refreshAll();
  document.getElementById('footer').innerHTML=
    `Episcopal Diocese of Texas · Congregational data ${YEARS[0]}–${YEARS[YEARS.length-1]} · ${DATA.churches.length} congregations. `+
    `Size tiers per diocesan "One Size Does Not Fit All" framework (ASA). 10-mile population is a per-year U.S. Census estimate: 2020 census tract counts summed within 10 miles of each church (ZIP centroid), scaled to each county's population trajectory across the 2000, 2010 and 2020 censuses and the 2020-2024 ACS 5-year estimates (interpolated between, held flat after). Charts require an internet connection (Chart.js CDN).`;
}
init();

</script>
</body>
</html>
